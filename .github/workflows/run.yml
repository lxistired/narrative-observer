name: Run Observer

on:
  schedule:
    # UTC 22:30 daily = Beijing 06:30 next morning (after US close + before Asia open)
    - cron: '30 22 * * *'
  workflow_dispatch:
    inputs:
      markets:
        description: 'Markets (comma-separated: us,tw,kr)'
        default: 'us,tw,kr'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -e .

      - name: Pull latest site/ from gh-pages
        run: |
          git fetch origin gh-pages || true
          if git rev-parse --verify origin/gh-pages > /dev/null 2>&1; then
            mkdir -p site
            git --work-tree=site checkout origin/gh-pages -- . || true
            rm -rf site/.git || true
          fi

      - name: Run observer
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: ${{ vars.XAI_MODEL || 'grok-4-1-fast-reasoning' }}
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          observer run --markets "${{ inputs.markets || 'us,tw,kr' }}"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
